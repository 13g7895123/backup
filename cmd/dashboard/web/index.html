<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>備份管理系統</title>
<style>
:root{
  --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --primary:#2563eb;--primary-h:#1d4ed8;--primary-light:#eff6ff;
  --success:#16a34a;--success-bg:#f0fdf4;--success-border:#bbf7d0;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fecaca;
  --warning:#d97706;--warning-bg:#fffbeb;
  --info:#0891b2;--info-bg:#ecfeff;
  --sidebar-w:230px;--radius:8px;--rs:4px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;color:var(--text);background:var(--bg);line-height:1.5}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;font-size:16px;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px}
/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:#0f172a;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h1{color:#fff;font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-nav{padding:8px 0;flex:1}
.nav-section{padding:16px 16px 5px;font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.65);cursor:pointer;transition:.15s;border-left:3px solid transparent;font-size:15px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(37,99,235,.2);color:#fff;border-left-color:#3b82f6}
.nav-item .ni{font-size:17px;width:18px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:19px;font-weight:700}
.header-right{display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
#content{flex:1;overflow-y:auto;padding:24px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;border-left:3px solid transparent}
.stat-card.c-blue{border-left-color:var(--primary)}.stat-card.c-green{border-left-color:var(--success)}
.stat-card.c-red{border-left-color:var(--danger)}.stat-card.c-yellow{border-left-color:var(--warning)}
.stat-label{font-size:14px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;color:var(--text);line-height:1.1}
.stat-sub{font-size:13px;color:var(--text3);margin-top:5px}
/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:15px;background:var(--surface)}
thead th{padding:10px 14px;text-align:left;font-weight:600;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafbfc}
.td-actions{text-align:right;white-space:nowrap}
.td-actions > *{vertical-align:middle}
.td-actions > * + *{margin-left:5px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-weight:500;transition:.15s;white-space:nowrap;font-size:15px}
.btn-sm{padding:5px 10px;font-size:14px}
.btn-xs{padding:3px 8px;font-size:13px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.btn-success:hover{background:#dcfce7}
.btn-ghost{color:var(--text2);border:1px solid transparent}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:13px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-success{background:var(--success-bg);color:var(--success)}.badge-success::before{background:var(--success)}
.badge-failed{background:var(--danger-bg);color:var(--danger)}.badge-failed::before{background:var(--danger)}
.badge-running{background:var(--info-bg);color:var(--info)}.badge-running::before{background:var(--info);animation:blink 1s infinite}
.badge-on{background:var(--success-bg);color:var(--success)}.badge-on::before{background:var(--success)}
.badge-off{background:var(--surface2);color:var(--text3)}.badge-off::before{background:var(--text3)}
.badge-files{background:#eff6ff;color:#1d4ed8}.badge-files::before{background:#1d4ed8}
.badge-database{background:#f5f3ff;color:#6d28d9}.badge-database::before{background:#6d28d9}
.badge-system{background:#fff7ed;color:#c2410c}.badge-system::before{background:#c2410c}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-weight:500;margin-bottom:5px;font-size:15px}
.form-hint{font-size:13px;color:var(--text3);margin-top:3px}
.form-input{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--surface);outline:none;transition:.15s}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-input[disabled]{background:var(--surface2);color:var(--text3)}
textarea.form-input{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px}
.form-check input[type=checkbox]{width:15px;height:15px;accent-color:var(--primary);cursor:pointer}
/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:34px;height:18px;background:var(--text3);border-radius:99px;position:relative;transition:.2s;flex-shrink:0}
.toggle-track.on{background:var(--primary)}
.toggle-thumb{position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.toggle-track.on .toggle-thumb{left:18px}
/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
#modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:560px;box-shadow:var(--shadow-md);margin:auto}
.modal-lg{max-width:720px}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:17px;font-weight:700}
.modal-close{font-size:18px;color:var(--text3);padding:4px 6px;border-radius:4px;line-height:1}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:18px 22px;max-height:65vh;overflow-y:auto}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 16px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-size:15px;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.admin-tabs{position:sticky;top:0;z-index:20;display:flex;flex-wrap:wrap;gap:8px;background:var(--bg);padding:8px 0 14px;border:0;margin-bottom:10px;overflow:visible}
.admin-tabs .tab{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:8px 14px;border:1px solid var(--border);border-radius:999px;background:var(--surface);box-shadow:0 1px 2px rgba(15,23,42,.04);color:var(--text2);font:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background-color .18s ease,border-color .18s ease,color .18s ease,box-shadow .18s ease}
.admin-tabs .tab:hover{background:var(--surface2);border-color:var(--text3);color:var(--text)}
.admin-tabs .tab.active{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 4px 10px rgba(37,99,235,.18)}
.admin-tabs .tab:focus-visible{outline:3px solid rgba(37,99,235,.25);outline-offset:2px}
.admin-tab-panel[hidden]{display:none!important}
.diff-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}
.diff-stat{padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2)}
.diff-stat b{display:block;font-size:20px;font-variant-numeric:tabular-nums}.diff-stat span{font-size:12px;color:var(--text2)}
.sql-preview{max-height:220px;overflow:auto;padding:12px;background:#172033;color:#e2e8f0;border-radius:6px;font:12px/1.55 monospace;white-space:pre-wrap;word-break:break-word}
@media(max-width:640px){.diff-summary{grid-template-columns:repeat(2,minmax(0,1fr))}.admin-tabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:12px}.admin-tabs .tab{flex:0 0 auto}}
/* Page header */
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-hdr-left h1{font-size:22px;font-weight:700}.page-hdr-left p{font-size:14px;color:var(--text2);margin-top:3px}
.page-hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* Filter bar */
.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
select.form-input{width:auto}
/* Loading / Empty */
.loading{text-align:center;padding:48px 24px;color:var(--text3)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
/* Toasts */
#toasts{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:var(--radius);color:#fff;font-size:15px;box-shadow:var(--shadow-md);animation:tslide .2s ease;pointer-events:all;max-width:360px}
.toast.info{background:#334155}.toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.warning{background:var(--warning)}
@keyframes tslide{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
/* Section gap */
.sg{margin-bottom:20px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.mono{font-family:'SF Mono',Fira Code,monospace;font-size:14px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;display:block}
.flex-c{display:flex;align-items:center;gap:8px}
.ml-a{margin-left:auto}
/* Project cards on dashboard */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.15s}
.proj-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.proj-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.proj-card h3{font-size:16px;font-weight:700}
.proj-card p{font-size:14px;color:var(--text2);margin-top:3px}
.proj-stats{display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:14px;color:var(--text2)}
.proj-stat-item{display:flex;flex-direction:column;gap:2px}
.proj-stat-item strong{font-size:16px;font-weight:700;color:var(--text)}
/* Capabilities */
.cap-section{margin-bottom:20px}
.cap-section h3{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--text)}
.cap-item{background:var(--surface2);border-radius:var(--rs);padding:11px 14px;margin-bottom:8px}
.cap-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cap-item h4{font-size:13px;font-weight:600}
.cap-item p{font-size:12px;color:var(--text2)}
.avail-yes{color:var(--success);font-weight:600;font-size:12px}
.avail-no{color:var(--danger);font-weight:600;font-size:12px}
.tag{display:inline-flex;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);margin:2px}
.route-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:6px}
.route-item{display:flex;gap:8px;align-items:center;padding:7px 10px;background:var(--surface2);border-radius:var(--rs);font-size:12px}
.method{font-weight:700;font-size:11px;padding:1px 6px;border-radius:3px;min-width:42px;text-align:center}
.m-get{background:#dbeafe;color:#1d4ed8}.m-post{background:#dcfce7;color:#15803d}
.m-put{background:#fef9c3;color:#a16207}.m-delete{background:#fee2e2;color:#b91c1c}
.m-patch{background:#f3e8ff;color:#7e22ce}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-hdr{text-align:center;font-size:12px;font-weight:600;color:var(--text2);padding:5px 0;background:var(--surface2);border-radius:3px}
.cal-cell{min-height:58px;border-radius:6px;padding:5px 7px;border:1px solid var(--border);background:var(--surface);position:relative}
.cal-empty{border:none!important;background:none!important;min-height:58px}
.cal-today{outline:2px solid var(--primary);outline-offset:-2px}
.cal-success{background:var(--surface);border-color:var(--border)}
.cal-failed{background:var(--surface);border-color:var(--border)}
.cal-running{background:var(--warning-bg);border-color:var(--warning)}
.cal-pending{background:var(--info-bg);border-color:var(--info)}
.cal-day-num{font-size:11px;font-weight:600;color:var(--text);line-height:1;text-align:right;display:block}
.cal-day-icon{position:absolute;bottom:5px;right:6px;font-size:14px;line-height:1}
/* Nav description */
.nav-item-desc{padding:2px 16px 9px 46px;font-size:11px;color:rgba(255,255,255,.35);line-height:1.4;margin-top:-6px}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>💾 備份管理系統</h1>
    </div>

<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-footer" id="modal-footer"></div>
  </div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════════════════ */
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 204) return null;
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch {
    throw new Error(`伺服器回應非 JSON（HTTP ${r.status}）`);
  }
  if (!r.ok) {
    const err = new Error(data.error || `HTTP ${r.status}`);
    err.data = data;
    err.status = r.status;
    throw err;
  }
  return data;
}

async function apiFormPost(path, formData) {
  const r = await fetch(path, { method: 'POST', body: formData });
  if (r.status === 204) return null;
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch {
    throw new Error(`伺服器回應非 JSON（HTTP ${r.status}）`);
  }
  if (!r.ok) {
    const err = new Error(data.error || `HTTP ${r.status}`);
    err.data = data;
    err.status = r.status;
    throw err;
  }
  return data;
}
const apiGet    = p      => api('GET',    p);
const apiPost   = (p, b) => api('POST',   p, b);
const apiPut    = (p, b) => api('PUT',    p, b);
const apiPatch  = (p, b) => api('PATCH',  p, b);
const apiDelete = p      => api('DELETE', p);

/* ═══════════════════════════════════════════════════════════════
   Utils
═══════════════════════════════════════════════════════════════ */
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'✓', error:'✕', warning:'⚠', info:'ℹ' };
  el.innerHTML = `<span>${icons[type]||'ℹ'}</span><span>${esc(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showPlainError(title, msg) {
  openModal(title, `
    <div style="background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:6px;padding:12px 14px;color:var(--danger);font-size:13px;word-break:break-all;white-space:pre-wrap;font-family:monospace">${esc(msg)}</div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">關閉</button>`, true);
}

function fmtSize(b) {
  if (!b) return '-';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function fmtDur(s) {
  if (!s) return '-';
  if (s < 60) return s.toFixed(1) + 's';
  return Math.floor(s/60) + 'm ' + (s % 60).toFixed(0) + 's';
}

// 從 cron 表達式判斷備份頻率
function cronFrequency(expr) {
  if (!expr) return null;
  const parts = expr.trim().split(/\s+/);
  if (parts.length < 5) return null;
  const [, hour, dom, , dow] = parts;
  if (dom !== '*' && dom !== '?') return 'monthly';
  if (dow !== '*' && dow !== '?') return 'weekly';
  if (hour !== '*') return 'daily';
  return 'other';
}

// 從 cron 表達式計算下次執行時間
function cronNextRun(expr) {
  if (!expr) return null;
  const parts = expr.trim().split(/\s+/);
  if (parts.length < 5) return null;
  const [minPart, hrPart, domPart, , dowPart] = parts;
  const pv    = v => (v === '*' || v === '?') ? null : parseInt(v, 10);
  const pstep = v => { const m = v.match(/^\*\/(\d+)$/); return m ? parseInt(m[1], 10) : null; };
  const minVal = pv(minPart);
  const hrVal  = pv(hrPart);
  const domVal = pv(domPart);
  const dowVal = pv(dowPart);
  const now  = new Date();
  const next = new Date(now);
  next.setSeconds(0); next.setMilliseconds(0);
  if (domVal !== null) {
    next.setDate(domVal);
    next.setHours(hrVal !== null ? hrVal : 0);
    next.setMinutes(minVal !== null ? minVal : 0);
    if (next <= now) next.setMonth(next.getMonth() + 1);
    return next.toISOString();
  }
  if (dowVal !== null) {
    next.setHours(hrVal !== null ? hrVal : 0);
    next.setMinutes(minVal !== null ? minVal : 0);
    let diff = (dowVal - now.getDay() + 7) % 7;
    if (diff === 0 && next <= now) diff = 7;
    next.setDate(now.getDate() + diff);
    return next.toISOString();
  }
  if (hrVal !== null) {
    next.setHours(hrVal);
    next.setMinutes(minVal !== null ? minVal : 0);
    if (next <= now) next.setDate(next.getDate() + 1);
    return next.toISOString();
  }
  const step = pstep(hrPart);
  if (step) {
    const targetMin = minVal !== null ? minVal : 0;
    next.setMinutes(targetMin);
    const nextH = Math.ceil((now.getHours() * 60 + now.getMinutes() + 1) / (step * 60)) * step;
    if (nextH >= 24) { next.setDate(next.getDate() + 1); next.setHours(0); }
    else next.setHours(nextH);
    return next.toISOString();
  }
  return null;
}

function statusBadge(s, msg = '') {
  const map = { success:'badge-success', failed:'badge-failed', running:'badge-running' };
  const labels = { success:'成功', failed:'失敗', running:'執行中' };
  return `<span class="badge ${map[s]||'badge-off'}" ${s==='failed'&&msg ? `title="${esc(msg)}"` : ''}>${labels[s]||esc(s)||'—'}</span>`;
}

function typeBadge(t, cfg = null) {
  let displayType = t;
  if (t === 'files' && cfg) {
    try {
      const c = typeof cfg === 'string' ? JSON.parse(cfg) : cfg;
      if (c && c.is_db_backup) displayType = 'database';
    } catch {}
  }
  const map = { files:'badge-files', database:'badge-database', system:'badge-system', syslog:'badge-files', gcp:'badge-database' };
  const labels = { files:'檔案', database:'資料庫', system:'系統', syslog:'系統日誌', gcp:'GCP' };
  return `<span class="badge ${map[displayType]||''}">${labels[displayType]||esc(displayType)}</span>`;
}

function agentStatusBadge(agent) {
  if (!agent) return '<span class="badge badge-off">—</span>';
  if (!agent.enabled) return '<span class="badge badge-off">停用</span>';
  const cls = agent.status === 'online' ? 'badge-on' : 'badge-off';
  const label = agent.status === 'online' ? '在線' : '離線';
  return `<span class="badge ${cls}">${label}</span>`;
}

function agentVersionBadge(state, note = '') {
  const map = {
    up_to_date: ['badge-success', '最新版'],
    outdated: ['badge-running', '待更新'],
    unknown: ['', '未回報'],
    no_release: ['badge-off', '無 Release'],
  };
  const [cls, label] = map[state] || ['', state || '—'];
  return `<span class="badge ${cls}" ${note ? `title="${esc(note)}"` : ''}>${esc(label)}</span>`;
}

function executorLabel(p, agentMap = {}) {
  if (!p) return '—';
  if (p.executor_type === 'local') return '本機';
  const agent = agentMap[p.executor_agent_id];
  return agent ? `Agent: ${agent.name}` : 'Agent';
}

function nasLabel(p, nasMap = {}) {
  if (!p) return '—';
  const target = nasMap[p.nas_target_id];
  const targetName = target ? target.name : (p.nas_target_id ? `NAS #${p.nas_target_id}` : '預設路徑');
  const sub = p.nas_subpath ? ` / ${p.nas_subpath}` : '';
  return `${targetName}${sub}`;
}

function pathDir(path) {
  if (!path) return '—';
  const idx = path.lastIndexOf('/');
  return idx > 0 ? path.slice(0, idx) : path;
}

function renderDashFreq(key) {
  const d = window._dashData;
  if (!d) return;

  document.querySelectorAll('#dash-freq-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.key === key);
  });

  const items = d.allItems.filter(it => cronFrequency(it.cron) === key);

  function periodRange(isPrev) {
    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (key === 'daily') {
      const s = isPrev ? new Date(+today - 86400000) : today;
      const e = isPrev ? today : now;
      return { start: s, end: e, label: isPrev ? '昨日' : '今日' };
    }
    if (key === 'weekly') {
      const wd  = today.getDay();
      const mon = new Date(+today - (wd === 0 ? 6 : wd - 1) * 86400000);
      const s   = isPrev ? new Date(+mon - 7 * 86400000) : mon;
      const e   = isPrev ? mon : now;
      return { start: s, end: e, label: isPrev ? '上週' : '本週' };
    }
    if (key === 'monthly') {
      const thisM = new Date(now.getFullYear(), now.getMonth(), 1);
      const lastM = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const s     = isPrev ? lastM : thisM;
      const e     = isPrev ? thisM : now;
      return { start: s, end: e, label: isPrev ? '上月' : '本月' };
    }
    return { start: new Date(0), end: now, label: isPrev ? '上期' : '本期' };
  }

  const curr = periodRange(false);
  const prev = periodRange(true);
  const filterRecs = range => d.allRecs.filter(r => {
    const t = new Date(r.created_at);
    return t >= range.start && t < range.end;
  });
  const currRecs = filterRecs(curr);
  const prevRecs = filterRecs(prev);

  const stat = recs => ({
    total: recs.length,
    ok:    recs.filter(r => r.status === 'success').length,
    fail:  recs.filter(r => r.status === 'failed').length,
  });
  const cs = stat(currRecs), ps = stat(prevRecs);

    const cls = st.fail > 0 ? 'c-red' : st.ok > 0 ? 'c-green' : '';

        ${st.fail > 0 ? `&nbsp;<span style="color:var(--danger)">✕ ${st.fail} 失敗</span>` : ''}
      </div>
    </div>`;
  };

  const itemRows = items.length === 0
    ? `<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px">此頻率無排程項目</td></tr>`
    : items.map(it => `<tr>

        <td><strong>${it.name}</strong>${it.desc ? `<span style="display:inline-block;margin-left:7px;padding:2px 10px;border-radius:99px;font-size:13px;font-weight:500;background:#eff6ff;color:#1d4ed8;vertical-align:middle">${it.desc}</span>` : ''}</td>

      </tr>`).join('');

  const recRows = recs => recs.slice(0, 15).map(r => `<tr>
    <td>${typeBadge(r.type)}</td>
    <td><span class="truncate">${esc(r.project_name||r.label||'—')}</span></td>

         <tbody>${recRows(recs)}</tbody>
       </table></div>`;

  document.getElementById('dash-freq-content').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">

    </div>
    <div class="table-wrap" style="margin-bottom:4px"><table>
      <thead><tr><th>類別</th><th>名稱</th><th>上次結果</th><th>最後執行</th><th>下次執行</th></tr></thead>
      <tbody>${itemRows}</tbody>
    </table></div>
    ${recSection(curr.label, currRecs)}
    ${recSection(prev.label, prevRecs)}
  `;
}

        </div>
        ${allItems.length === 0
          ? '<div class="empty" style="padding:16px"><div class="empty-icon">⏰</div>目前沒有啟用中且有排程的備份設定</div>'
          : `<div class="tabs" id="dash-freq-tabs">
              ${activeTabs.map(t => `<div class="tab${t.key===defaultTab?' active':''}" data-key="${t.key}" onclick="renderDashFreq('${t.key}')">${t.label}</div>`).join('')}
             </div>
             <div id="dash-freq-content"></div>`}
      </div>

      <div class="sg">
        <div class="flex-c" style="margin-bottom:12px">
          <h2 style="font-size:15px;font-weight:700">最近備份紀錄</h2>
        </div>
        ${recentRecs.length === 0 ? '<div class="empty"><div class="empty-icon">🗂</div>尚無備份紀錄</div>' : `
        <div class="table-wrap">
          <table>
            <thead><tr><th>專案</th><th>類型</th><th>狀態</th><th>大小</th><th>時間</th><th>耗時</th><th></th></tr></thead>
            <tbody>${recentRecs.map(r => {
              if (r.error_msg) _recordErrors[r.id] = { msg: r.error_msg, projectId: r.project_id };
              return `<tr>
              <td><span class="truncate">${esc(r.project_name)}</span></td>
              <td>${typeBadge(r.type)}</td>
              <td>${statusBadge(r.status, r.error_msg)}</td>
              <td>${fmtSize(r.size_bytes)}</td>
              <td style="white-space:nowrap">${fmtDate(r.created_at)}</td>
              <td>${fmtDur(r.duration_sec)}</td>
              <td class="td-actions">${r.status==='failed'&&r.error_msg ? `<button class="btn btn-xs btn-danger" onclick="showRecordError(${r.id})">檢視原因</button>` : ''}</td>
            </tr>`;
            }).join('')}</tbody>
          </table>
        </div>`}
      </div>
    `);

    if (allItems.length > 0) renderDashFreq(defaultTab);

  } catch(e) {
    setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${esc(e.message)}</div>`);
  }
}

function toggleProjectExecutorFields(mode) {
  const wrap = document.getElementById('f-executor-agent-wrap');
  if (wrap) wrap.style.display = mode === 'agent' ? 'block' : 'none';
}

async function submitProject(id = null) {
  const split = s => s.split(',').map(x=>x.trim()).filter(Boolean);
  const dbMode = document.getElementById('f-dbmode').value;
	  const executorType = document.getElementById('f-executor-type').value;
	  const executorAgentID = document.getElementById('f-executor-agent').value;
	  const transferMode = document.getElementById('f-transfer-mode').value;
	  const nasTargetID = document.getElementById('f-nas-target-id').value;
  const body = {
    name:                document.getElementById('f-name').value.trim(),
    description:         document.getElementById('f-desc').value.trim(),
    nas_base:            document.getElementById('f-nas').value.trim() || '/mnt/nas/backups',
    nas_target_id:       nasTargetID ? parseInt(nasTargetID, 10) : null,
    nas_subpath:         document.getElementById('f-nas-subpath').value.trim(),
    project_path:        document.getElementById('f-path').value.trim(),
    backup_dirs:         split(document.getElementById('f-bdirs').value),
	    executor_type:       executorType,
	    executor_agent_id:   executorType === 'agent' && executorAgentID ? parseInt(executorAgentID, 10) : null,
	    transfer_mode:       transferMode,
	    enabled:             true,
    db_type: '', db_host: '', db_port: 0, db_name: '', db_user: '', db_password: '', db_password_env: '', docker_db_container: ''
  };
  if (dbMode === 'docker') {
    body.db_type             = document.getElementById('f-dbtype-d').value;
    body.docker_db_container = document.getElementById('f-container').value.trim();
    body.db_name             = document.getElementById('f-dbname-d').value.trim();
    body.db_user             = document.getElementById('f-dbuser-d').value.trim();
    body.db_password         = document.getElementById('f-dbpassword-d').value;
    body.db_password_env     = document.getElementById('f-dbpass-d').value.trim();
  } else if (dbMode === 'direct') {
    body.db_type         = document.getElementById('f-dbtype').value;
    body.db_host         = document.getElementById('f-dbhost').value.trim();
    body.db_port         = parseInt(document.getElementById('f-dbport').value) || 5432;
    body.db_name         = document.getElementById('f-dbname').value.trim();
    body.db_user         = document.getElementById('f-dbuser').value.trim();
    body.db_password_env = document.getElementById('f-dbpass').value.trim();
  }
	  if (!body.name) { toast('請填寫專案名稱','warning'); return; }
	  if (body.executor_type === 'agent' && !body.executor_agent_id) { toast('請選擇執行 Agent','warning'); return; }
	  if (body.transfer_mode === 'upload' && body.executor_type !== 'agent') { toast('upload 傳輸模式需使用指定 Agent','warning'); return; }
  try {
    if (id) { await apiPut(`/api/projects/${id}`, body); toast('專案已更新','success'); }
    else { await apiPost('/api/projects', body); toast('專案已建立','success'); }
    closeModal();
    renderProjects();
  } catch(e) { toast(e.message,'error'); }
}

function nasDefaultsGet() {
  try { return JSON.parse(localStorage.getItem('nas_defaults') || '{}'); } catch { return {}; }
}
function nasDefaultsSet(v) { localStorage.setItem('nas_defaults', JSON.stringify(v)); }

function showNasSettings() {
  const cfg = nasDefaultsGet();
  openModal('NAS 預設路徑設定', `
    <div class="form-group">
      <label class="form-check" style="margin-bottom:12px">
        <input type="checkbox" id="nas-enabled" ${cfg.nasEnabled ? 'checked' : ''}> 啟用預設路徑（新增專案時自動帶入）
      </label>
    </div>
    <div class="form-group">
      <label class="form-label">NAS 預設備份根目錄</label>
      <input id="nas-path" class="form-input" value="${esc(cfg.nasPath || '/mnt/nas/backups')}" placeholder="/mnt/nas/backups">
      <div class="form-hint">啟用後，新增專案時會自動填入此路徑</div>
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveNasSettings()">儲存</button>
  `);
}

function saveNasSettings() {
  const enabled = document.getElementById('nas-enabled').checked;
  const path    = document.getElementById('nas-path').value.trim() || '/mnt/nas/backups';
  nasDefaultsSet({ nasEnabled: enabled, nasPath: path });
  toast('NAS 預設路徑已儲存', 'success');
  closeModal();
}

      <div class="form-hint">選擇已填妥資料的 JSON 範本檔案</div>
    </div>

  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="importProjectFromFile()">↑ 匯入</button>
  `, true);

  document.getElementById('import-file').addEventListener('change', previewImportFile);
}

function downloadTemplate(mode) {
  let data, filename;
  if (mode === 'batch') {
    data = [
      { ..._projectTemplate, name: 'project-a' },
      { ..._projectTemplate, name: 'project-b', db_type: 'mysql', db_host: '127.0.0.1', db_name: 'mydb' },
      { ..._projectTemplate, name: 'project-c', docker_db_container: 'my-postgres-1', db_name: 'appdb', db_user: 'appuser' }
    ];
    filename = 'projects-batch-template.json';
  } else {
    data = _projectTemplate;
    filename = 'project-template.json';
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function previewImportFile() {
  const file = document.getElementById('import-file').files[0];
  const preview = document.getElementById('import-preview');
  if (!file) { preview.innerHTML = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const items = Array.isArray(parsed) ? parsed : [parsed];
      preview.innerHTML = `
        <div style="padding:10px 14px;background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--rs);font-size:13px;color:var(--success)">
          ✓ 檔案解析成功，共 <strong>${items.length}</strong> 筆專案資料
          <div style="margin-top:6px;color:var(--text2)">${items.map((p,i) => `<span style="margin-right:8px">${i+1}. ${esc(p.name||'(未命名)')}</span>`).join('')}</div>
        </div>`;
    } catch(ex) {
      preview.innerHTML = `<div style="padding:10px 14px;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--rs);font-size:13px;color:var(--danger)">✕ JSON 格式錯誤：${esc(ex.message)}</div>`;
    }
  };
  reader.readAsText(file);
}

async function importProjectFromFile() {
  const file = document.getElementById('import-file')?.files[0];
  if (!file) { toast('請先選取 JSON 檔案', 'warning'); return; }
  let parsed;
  try {
    const text = await file.text();
    parsed = JSON.parse(text);
  } catch(ex) {
    toast('JSON 格式錯誤：' + ex.message, 'error'); return;
  }
  const items = Array.isArray(parsed) ? parsed : [parsed];
  if (items.length === 0) { toast('檔案內沒有資料', 'warning'); return; }

  let success = 0, fail = 0, failMsgs = [];
  for (const proj of items) {
    const body = {
      name:                String(proj.name || '').trim(),
      description:         String(proj.description || '').trim(),
      nas_base:            String(proj.nas_base || '/mnt/nas/backups').trim(),
      project_path:        String(proj.project_path || '').trim(),
      backup_dirs:         Array.isArray(proj.backup_dirs) ? proj.backup_dirs.filter(Boolean) : [],
      enabled:             proj.enabled !== false,
      db_type:             String(proj.db_type || ''),
      db_host:             String(proj.db_host || ''),
      db_port:             parseInt(proj.db_port) || 0,
      db_name:             String(proj.db_name || ''),
      db_user:             String(proj.db_user || ''),
      db_password:         String(proj.db_password || ''),
      db_password_env:     String(proj.db_password_env || ''),
      docker_db_container: String(proj.docker_db_container || '')
    };
    if (!body.name) { fail++; failMsgs.push('第 ' + (success+fail) + ' 筆：name 為空'); continue; }
    try {
      await apiPost('/api/projects', body);
      success++;
    } catch(ex) {
      fail++;
      failMsgs.push(`「${body.name}」：${ex.message}`);
    }
  }

  closeModal();
  if (success > 0) toast(`成功匯入 ${success} 個專案` + (fail > 0 ? `，${fail} 筆失敗` : ''), fail > 0 ? 'warning' : 'success');
  if (failMsgs.length) {
    openModal('部分匯入失敗', `
      <p style="margin-bottom:10px;color:var(--danger)">以下 ${failMsgs.length} 筆匯入失敗：</p>
      <ul style="font-size:13px;color:var(--text2);line-height:1.8;padding-left:18px">
        ${failMsgs.map(m => `<li>${esc(m)}</li>`).join('')}
      </ul>
    `);
  }
  renderProjects();
}

function switchBatchSchedTab(tab) {
  document.querySelectorAll('#batch-sched-tabs .tab').forEach(el => {
    const map = { '建立排程':'create', '刪除排程':'delete' };
    el.classList.toggle('active', map[el.textContent] === tab);
  });
  document.getElementById('batch-sched-create').style.display = tab === 'create' ? '' : 'none';
  document.getElementById('batch-sched-delete').style.display = tab === 'delete' ? '' : 'none';
  const btn = document.getElementById('batch-sched-btn');
  if (tab === 'create') {
    btn.textContent = '建立排程';
    btn.className = 'btn btn-primary';
    btn.onclick = submitBatchProjSchedule;
  } else {
    btn.textContent = '刪除選取排程';
    btn.className = 'btn btn-danger';
    btn.onclick = submitBatchDeleteProjSchedule;
  }
}

function batchCheckAll(checked) {
  document.querySelectorAll('.batch-proj-cb').forEach(cb => { cb.checked = checked; });
  document.querySelectorAll('.batch-sched-cb').forEach(cb => { cb.checked = checked; });
}

async function submitBatchProjSchedule() {
  const cron_expr = document.getElementById('batch-scron').value.trim();
  if (!cron_expr) { toast('請填寫 Cron 表達式', 'warning'); return; }
  const label = document.getElementById('batch-slabel').value.trim();
  const target_types = [document.getElementById('batch-stypes').value];
  const projIds = [...document.querySelectorAll('.batch-proj-cb:checked')].map(cb => parseInt(cb.value));
  if (projIds.length === 0) { toast('請至少選擇一個專案', 'warning'); return; }

  const btn = document.getElementById('batch-sched-btn');
  btn.disabled = true;
  btn.textContent = '建立中...';
  let ok = 0, fail = 0;
  for (const pid of projIds) {
    try {
      await apiPost(`/api/projects/${pid}/schedules`, { label, cron_expr, target_types, enabled: true });
      ok++;
    } catch { fail++; }
  }
  btn.disabled = false;
  btn.textContent = '建立排程';
  closeModal();
  if (fail > 0) toast(`完成：${ok} 個成功，${fail} 個失敗`, 'warning');
  else toast(`已為 ${ok} 個專案建立排程`, 'success');
}

async function submitBatchDeleteProjSchedule() {
  const toDelete = [...document.querySelectorAll('.batch-sched-cb:checked')].map(cb => ({
    projId: parseInt(cb.dataset.proj),
    schedId: parseInt(cb.value),
  }));
  if (toDelete.length === 0) { toast('請至少選擇一個排程', 'warning'); return; }
  if (!confirm(`確定要刪除 ${toDelete.length} 個排程？`)) return;

  const btn = document.getElementById('batch-sched-btn');
  btn.disabled = true;
  btn.textContent = '刪除中...';
  let ok = 0, fail = 0;
  for (const { projId, schedId } of toDelete) {
    try {
      await apiDelete(`/api/projects/${projId}/schedules/${schedId}`);
      ok++;
    } catch { fail++; }
  }
  btn.disabled = false;
  btn.textContent = '刪除選取排程';
  closeModal();
  if (fail > 0) toast(`完成：${ok} 個刪除成功，${fail} 個失敗`, 'warning');
  else toast(`已刪除 ${ok} 個排程`, 'success');
}

    if (type === 'database') return `${c.db_type||''}@${c.host||''}:${c.port||''} / ${c.name||''}`;
    if (type === 'system') return (c.include||[]).join(', ');
  } catch { return ''; }
  return '';
}

          <option value="postgres" ${cfg.db_type==='postgres'?'selected':''}>PostgreSQL</option>

function buildTargetConfig(type) {
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const c = id => { const el = document.getElementById(id); return el ? el.checked : false; };
  const split = s => s.split(',').map(x=>x.trim()).filter(Boolean);
  if (type === 'files')    return { source: v('f-source'), compress: 'gzip', exclude: split(v('f-exclude')), is_db_backup: c('f-is-db') };
  if (type === 'database') return { db_type: v('f-dbtype'), host: v('f-dbhost'), port: parseInt(v('f-dbport'))||5432, name: v('f-dbname'), user: v('f-dbuser'), password: v('f-dbpassword'), password_env: v('f-dbpass'), container_name: v('f-dbcontainer') };
  if (type === 'system')   return { include: split(v('f-include')), exclude: split(v('f-sys-exclude')), backup_packages: c('f-pkg'), backup_services: c('f-svc') };
  return {};
}

async function submitTarget(projId, tid = null) {
  const type = document.getElementById('f-ttype').value;
  const label = document.getElementById('f-tlabel').value.trim();
  const config = buildTargetConfig(type);
  if (type === 'files' && !config.source) { toast('請填寫來源目錄','warning'); return; }
  if (type === 'database' && (!config.host && !config.container_name)) { toast('請填寫主機位址或 Container 名稱','warning'); return; }
  const body = { type, label, config, enabled: true };
  try {
    if (tid) { await apiPut(`/api/projects/${projId}/targets/${tid}`, body); toast('已更新','success'); }
    else { await apiPost(`/api/projects/${projId}/targets`, body); toast('已新增','success'); }
    closeModal();
    renderTargetsTab(projId);
  } catch(e) { toast(e.message,'error'); }
}

async function deleteTarget(projId, tid) {
  if (!confirm('確定要刪除此備份目標？')) return;
  try {
    await apiDelete(`/api/projects/${projId}/targets/${tid}`);
    toast('已刪除','success');
    renderTargetsTab(projId);
  } catch(e) { toast(e.message,'error'); }
}

    closeModal();
    if (currentProjectId === projId) loadTab(projId, 'records');
  } catch(e) { toast(e.message,'error'); }
}

async function triggerSmokeBackup(projId) {
  try {
    const r = await apiPost(`/api/projects/${projId}/test-backup`, { target_type: 'all' });
    toast(r.message || 'smoke backup 已觸發', 'success');
    if (currentProjectId === projId) loadTab(projId, 'records');
  } catch(e) { toast(e.message, 'error'); }
}

async function retryRecord(id) {
  const rec = _recordErrors[id];
  if (!rec || !rec.projectId) { toast('無法取得備份資訊', 'error'); return; }
  try {
    const r = await apiPost('/api/backups/trigger', { project_id: rec.projectId, target_type: rec.type || '' });
    toast(r.message || '重試已觸發', 'success');
    renderBackups();
  } catch(e) { toast(e.message, 'error'); }
}

let backupFilter = { type: '', status: '', limit: 20, offset: 0 };

async function renderBackups() {
  setTitle('備份紀錄');

    const total = data.total   || 0;
    const pages = Math.ceil(total / backupFilter.limit);
    const curPage = Math.floor(backupFilter.offset / backupFilter.limit) + 1;

    // 快取錯誤訊息供 showRecordError 使用
	    recs.forEach(r => { _recordErrors[r.id] = { msg: r.error_msg, projectId: r.project_id, type: r.type, filename: r.filename, logRef: r.log_ref, path: r.path, agentName: r.agent_name, runHost: r.run_host }; });

        <div class="page-hdr-right">

      </div>

          <option value="database" ${backupFilter.type==='database'?'selected':''}>資料庫</option>
        </select>
        <select class="form-input" id="f-bstatus" onchange="applyBackupFilter()" style="min-width:120px">
          <option value="">全部狀態</option>
          <option value="success" ${backupFilter.status==='success'?'selected':''}>成功</option>
          <option value="failed"  ${backupFilter.status==='failed' ?'selected':''}>失敗</option>
          <option value="running" ${backupFilter.status==='running'?'selected':''}>執行中</option>
        </select>
        <button class="btn btn-sm btn-secondary" onclick="clearBackupFilter()">清除篩選</button>
        <span style="font-size:12px;color:var(--text2);margin-left:auto">第 ${curPage}/${pages||1} 頁</span>
      </div>
      ${recs.length===0 ? '<div class="empty"><div class="empty-icon">🗂</div>沒有符合條件的備份紀錄</div>' : `
      <div class="table-wrap">
        <table>
          <thead><tr><th>專案</th><th>類型</th><th>檔案名稱</th><th>狀態</th><th>Agent / Host</th><th>NAS / Log</th><th>大小</th><th>耗時</th><th>觸發方式</th><th>時間</th><th></th></tr></thead>
          <tbody>${recs.map(r => `<tr>
            <td><span style="font-weight:600">${esc(r.project_name)}</span></td>
            <td>${typeBadge(r.type)}</td>
            <td><span class="mono truncate">${esc(r.filename)}</span></td>
            <td>${statusBadge(r.status, r.error_msg)}</td>
            <td><div>${esc(r.agent_name || '本機')}</div><div style="font-size:12px;color:var(--text2)">${esc(r.run_host||'—')}</div></td>
            <td><div class="mono truncate" title="${esc(pathDir(r.path))}">${esc(pathDir(r.path))}</div><div style="font-size:12px;color:var(--text2)">${r.log_ref ? `<span class="mono" title="${esc(r.log_ref)}">${esc(r.log_ref)}</span>` : '—'}</div></td>
            <td>${fmtSize(r.size_bytes)}</td>
            <td>${fmtDur(r.duration_sec)}</td>
            <td><span class="badge badge-off">${esc(r.triggered_by||'—')}</span></td>
            <td style="font-size:13px;white-space:nowrap">${fmtDate(r.created_at)}</td>
	            <td class="td-actions">
	              ${r.status==='failed'&&r.error_msg ? `<button class="btn btn-xs btn-danger" onclick="showRecordError(${r.id})">檢視原因</button>` : ''}
	              ${r.status==='failed' ? `<button class="btn btn-xs btn-success" onclick="retryRecord(${r.id})">重試</button>` : ''}
	              ${r.status==='success' ? `<button class="btn btn-xs btn-success" onclick="showRestoreRecord(${r.id})">還原</button>` : ''}

function applyBackupFilter() {
  backupFilter.type   = document.getElementById('f-btype'  )?.value || '';
  backupFilter.status = document.getElementById('f-bstatus')?.value || '';
  backupFilter.offset = 0;
  renderBackups();
}

function clearBackupFilter() {
  backupFilter = { type:'', status:'', limit:20, offset:0 };
  renderBackups();
}

function backupPage(page) {
  backupFilter.offset = page * backupFilter.limit;
  renderBackups();
}

// 儲存失敗紀錄的錯誤訊息，供 showRecordError 使用
const _recordErrors = {};
const _restoreErrors = {};

function showRestoreError(id) {
  showPlainError('還原失敗原因', _restoreErrors[id] || '(無錯誤訊息)');
}

function showRecordError(id) {
  const rec = _recordErrors[id];
  const msg = rec ? rec.msg : '(無錯誤訊息)';

  // 解析 [cmd] ... \n[error] ... \n[stderr] ... 格式
  let cmdLine = '', errorLine = '', stderrLine = '';
  const cmdMatch    = msg.match(/\[cmd\]\s*([^\n]+)/);
  const errorMatch  = msg.match(/\[error\]\s*([^\n]+)/);
  const stderrMatch = msg.match(/\[stderr\]\s*([\s\S]+)/);
  if (cmdMatch)    cmdLine    = cmdMatch[1].trim();
  if (errorMatch)  errorLine  = errorMatch[1].trim();
  if (stderrMatch) stderrLine = stderrMatch[1].trim();

  const cmdSection = cmdLine ? `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">執行的指令</div>
      <div style="background:#1e293b;color:#e2e8f0;padding:10px 14px;border-radius:6px;font-family:monospace;font-size:13px;word-break:break-all;white-space:pre-wrap">${esc(cmdLine)}</div>
    </div>` : '';

  const stderrSection = stderrLine ? `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">指令輸出 (stderr)</div>
      <div style="background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:6px;padding:10px 14px;color:var(--danger);font-size:13px;word-break:break-all;white-space:pre-wrap;font-family:monospace">${esc(stderrLine)}</div>
    </div>` : '';

  const rawMsg = errorLine || msg;
  const metaSection = rec ? `
    <div style="margin-bottom:14px;font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:4px">
      <div>Agent：<span class="mono">${esc(rec.agentName || '本機')}</span></div>
      <div>Host：<span class="mono">${esc(rec.runHost || '—')}</span></div>
      <div>NAS：<span class="mono">${esc(pathDir(rec.path || ''))}</span></div>
      <div>Log：<span class="mono">${esc(rec.logRef || '—')}</span></div>
    </div>` : '';

  openModal('備份失敗原因', `
    ${metaSection}
    ${cmdSection}
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">錯誤訊息</div>
      <div style="background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:6px;padding:12px 14px;color:var(--danger);font-size:13px;word-break:break-all;white-space:pre-wrap;font-family:monospace">${esc(rawMsg)}</div>
    </div>
    ${stderrSection}
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
    ${rec && rec.projectId ? `<button class="btn btn-primary" onclick="closeModal();retryRecord(${id})">重試</button>` : ''}
  `, true);
}

async function deleteRecord(id, projId = null) {
  if (!confirm('確定刪除此備份紀錄？（不會刪除 NAS 上的實體檔案）')) return;
  try {
    await apiDelete(`/api/backups/${id}`);
    toast('備份紀錄已刪除','success');
    if (projId) renderProjectRecords(projId);
    else renderBackups();
  } catch(e) { toast(e.message,'error'); }
}

function showRestoreRecord(id) {
  const rec = _recordErrors[id] || {};
  const targetHint = rec.type === 'database' ? '新資料庫名稱；覆蓋時可留空使用原 DB' : '還原目標路徑；覆蓋時可留空使用原路徑';

    <div style="margin-bottom:14px;font-size:13px;color:var(--text2)">
      <div>檔案：<span class="mono">${esc(rec.filename || '')}</span></div>
      <div>類型：${typeBadge(rec.type || '')}</div>
    </div>
    <div class="form-group">
      <label class="form-label">還原策略</label>
      <select id="f-restore-strategy" class="form-input" onchange="toggleRestoreConfirm()">
        <option value="new">new：還原到新位置 / 新資料庫</option>
        <option value="overwrite">overwrite：覆蓋原位置 / 原資料庫</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">目標</label>
      <input id="f-restore-target" class="form-input" placeholder="${esc(targetHint)}">
      <div class="form-hint">${esc(targetHint)}</div>
    </div>
    <div class="form-group" id="restore-confirm-wrap" style="display:none">
      <label class="form-label">覆蓋確認</label>
      <input id="f-restore-confirm" class="form-input" placeholder="輸入 RESTORE 才能覆蓋">
      <div class="form-hint" style="color:var(--danger)">overwrite 會覆蓋現有資料，操作前請確認已有額外備份。</div>
    </div>
    ${rec.type === 'database' ? `<div class="form-group"><div style="display:flex;align-items:center;justify-content:space-between;gap:8px"><label class="form-label" style="margin:0">還原前差異確認</label><button type="button" class="btn btn-sm btn-secondary" onclick="loadRestorePreview(${id})">重新比較</button></div><div class="form-hint">比較上一次成功備份與本次準備還原的備份；不會連線或修改資料庫。</div><div id="restore-diff-preview"><div class="loading"><div class="spinner"></div>讀取兩份備份並比較...</div></div></div>` : ''}
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-danger" onclick="submitRestoreRecord(${id})">開始還原</button>
  `, true);
  if (rec.type === 'database') loadRestorePreview(id);
}

async function loadRestorePreview(id) {
  const el = document.getElementById('restore-diff-preview');
  if (!el) return;
  el.innerHTML='<div class="loading"><div class="spinner"></div>讀取兩份備份並比較...</div>';
  try {
    const res = await apiGet(`/api/backups/${id}/restore-preview`);
    el.innerHTML=renderSQLDiff(res.diff,`上次：${res.previous}`,`本次：${res.backup}`);
  } catch(e) {
    el.innerHTML=`<div style="margin-top:10px;padding:10px 12px;border:1px solid var(--danger-border);background:var(--danger-bg);color:var(--danger);border-radius:6px;font-size:13px">無法比較上次備份：${esc(e.message)}<br>仍可在確認風險後執行還原。</div>`;
  }
}

function toggleRestoreConfirm() {
  const strategy = document.getElementById('f-restore-strategy')?.value || 'new';
  const wrap = document.getElementById('restore-confirm-wrap');
  if (wrap) wrap.style.display = strategy === 'overwrite' ? 'block' : 'none';
}

async function submitRestoreRecord(id) {
  const strategy = document.getElementById('f-restore-strategy').value;
  const target = document.getElementById('f-restore-target').value.trim();
  const confirmText = document.getElementById('f-restore-confirm')?.value.trim() || '';
  if (strategy === 'new' && !target) { toast('new 策略需填寫目標', 'warning'); return; }
  if (strategy === 'overwrite' && confirmText !== 'RESTORE') { toast('覆蓋還原需輸入 RESTORE', 'warning'); return; }
  try {
    const res = await apiPost('/api/restore', { record_id: id, strategy, target, confirm: confirmText });
    if (res.status === 'queued') {
      toast(`還原已排入佇列：${res.target || res.type || id}`, 'success');
    } else {
      toast(`還原完成：${res.target || res.type || id}`, 'success');
    }
    closeModal();
  } catch(e) { toast(e.message, 'error'); }
}

  try {
    const items = await apiGet('/api/gcpconfigs');
    const c = items.find(x => x.id === id);
    if (!c) return;
    const script = `#!/bin/bash

# === 設定區 ===
DATE=$(date +%F)
BACKUP_DIR="${c.backup_dir}/$DATE"
BACKUP_DB_DIR="${c.backup_db_dir}/$DATE"
REMOTE_USER="${c.remote_user}"
REMOTE_HOST="${c.remote_host}"
REMOTE_PATH="${c.remote_path}/$DATE"
REMOTE_DB_PATH="${c.remote_db_path}/$DATE"
SSH_KEY="${c.ssh_key}"

# === 傳送到 GCP VPS ===
rsync -avz -e "ssh -i $SSH_KEY" "$BACKUP_DIR/" "$REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH"
rsync -avz -e "ssh -i $SSH_KEY" "$BACKUP_DB_DIR/" "$REMOTE_USER@$REMOTE_HOST:$REMOTE_DB_PATH"
`;
    openModal('Shell 腳本預覽', `
      <div style="background:#1e293b;color:#e2e8f0;padding:14px;border-radius:6px;font-family:monospace;font-size:12px;white-space:pre;overflow-x:auto">${esc(script)}</div>

function runStatusBadge(status, msg = '') {
  if (!status) return '';
  if (status === 'failed' && msg) {
    return `<span style="color:var(--danger);font-size:11px;cursor:pointer;text-decoration:underline dotted" onclick="showRunMsg(${JSON.stringify(msg)})">✕ 失敗 ⓘ</span>`;
  }
  const map = {
    running: '<span style="color:var(--warning);font-size:11px">⏳ 執行中</span>',
    success: '<span style="color:var(--success);font-size:11px">✓ 成功</span>',
    failed:  '<span style="color:var(--danger);font-size:11px">✕ 失敗</span>',
  };
  return map[status] || `<span style="font-size:11px">${esc(status)}</span>`;
}

function showRunMsg(msg) {
  openModal('執行錯誤詳細', `
    <div style="background:#1e293b;color:#fca5a5;padding:14px;border-radius:6px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;overflow-y:auto;max-height:420px">${esc(msg)}</div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">關閉</button>`, true);
}

    const rows = (res.checks || []).map(c => `
      <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">

        <div>
          <div style="font-weight:600;font-size:13px;color:${c.ok?'var(--text)':'var(--danger)'}">${esc(c.name)}</div>

        </div>

    const overall = res.ok
      ? '<div style="color:var(--success);font-weight:700;margin-bottom:12px">✅ 所有檢查通過</div>'

      `<button class="btn btn-secondary" onclick="closeModal()">關閉</button>`, true);
  } catch(e) { toast(e.message, 'error'); }
  finally { if (btn) { btn.disabled = false; btn.textContent = '🔍 測試'; } }

    items.forEach(it => { if (byType[it.type]) byType[it.type].push(it); });

    function itemRow(it) {
      const typeLabel = it.type === 'project' ? '📁 專案' : it.type === 'syslog' ? '📋 日誌' : '☁️ GCP';
      const runBtn = it.type === 'project'
        ? `<button class="btn btn-xs btn-success" onclick="runIntProject(${it.id})">▶ 執行</button>`
        : it.type === 'syslog'
          ? `<button class="btn btn-xs btn-success" onclick="runSyslogInt(${it.id})">▶ 執行</button>`
          : `<button class="btn btn-xs btn-success" onclick="runGcpInt(${it.id})">▶ 執行</button>`;
      return `<tr id="int-row-${it.type}-${it.id}">
        <td style="width:32px"><input type="checkbox" onchange="intToggleSelect('${it.type}',${it.id},this.checked)"
          ${_integratedSelected.some(s=>s.type===it.type&&s.id===it.id)?'checked':''}></td>
        <td><span class="badge badge-system" style="font-size:11px">${typeLabel}</span></td>
        <td><strong>${esc(it.name)}</strong></td>
        <td><span class="badge ${it.enabled?'badge-on':'badge-off'}">${it.enabled?'啟用':'停用'}</span></td>
        <td><span class="mono" style="font-size:12px;color:var(--text2)">${esc(it.cron_expr)||'<span style="color:var(--text3)">未設定</span>'}</span></td>
        <td style="font-size:12px">${runStatusBadge(it.run_status, it.run_message)}${it.last_run_at?'<br><span style="color:var(--text3)">'+fmtDate(it.last_run_at)+'</span>':''}</td>
        <td class="td-actions">${runBtn}</td>
      </tr>`;
    }

    function section(title, type, list) {
      if (!list.length) return '';
      return `<div style="margin-bottom:20px">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">${title}（${list.length} 項，啟用 ${list.filter(x=>x.enabled).length} 項）</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="width:32px"><input type="checkbox" id="chk-all-${type}" onchange="intSelectAllType('${type}',this.checked)"></th>
              <th>類型</th><th>名稱</th><th>狀態</th><th>排程頻率（cron）</th><th>最後執行</th><th style="text-align:right">操作</th>
            </tr></thead>
            <tbody>${list.map(itemRow).join('')}</tbody>
          </table>
        </div>
      </div>`;
    }

    setContent(`
      <div class="page-hdr">
        <div class="page-hdr-left"><h1>整合備份</h1><p>統一管理並執行所有備份項目</p></div>
        <div class="page-hdr-right" style="gap:8px">
          <button class="btn btn-primary" onclick="intRunAll()">▶ 執行全部已啟用</button>
          <button class="btn btn-secondary" onclick="renderIntegratedBackup()">🔄 重新整理</button>

      </div>

      <div id="int-batch-bar" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
        <span id="int-sel-count" style="font-size:13px;color:var(--text2)">已選 0 項</span>
        <button class="btn btn-xs btn-primary" onclick="intBatchRun()">▶ 批次執行</button>
        <button class="btn btn-xs btn-secondary" onclick="showBatchSchedule()">🕐 設定排程頻率</button>
        <button class="btn btn-xs btn-ghost" style="margin-left:auto" onclick="intClearSelect()">取消選取</button>
      </div>

      ${section('📁 專案備份', 'project', byType.project)}
      ${section('📋 系統日誌備份', 'syslog', byType.syslog)}
      ${section('☁️ GCP 備份', 'gcp', byType.gcp)}
      ${items.length===0?'<div class="empty"><div class="empty-icon">🔄</div>目前無任何備份項目</div>':''}
    `);
    // 初始隱藏 batch bar（已在 HTML 中，但用 display:none 覆蓋）
    const bar = document.getElementById('int-batch-bar');
    if (bar) bar.style.display = 'none';
  } catch(e) { setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${esc(e.message)}</div>`); }
}

function intToggleSelect(type, id, checked) {
  if (checked) {
    if (!_integratedSelected.some(s=>s.type===type&&s.id===id))
      _integratedSelected.push({type, id});
  } else {
    _integratedSelected = _integratedSelected.filter(s=>!(s.type===type&&s.id===id));
  }
  updateIntBatchBar();
}

function intSelectAllType(type, checked) {
  document.querySelectorAll(`#int-row-${type}-*`).forEach(() => {}); // no-op placeholder
  document.querySelectorAll('[id^="int-row-'+type+'-"]').forEach(row => {
    const chk = row.querySelector('input[type=checkbox]');
    if (!chk) return;
    const id = parseInt(row.id.split('-').pop());
    chk.checked = checked;
    if (checked) {
      if (!_integratedSelected.some(s=>s.type===type&&s.id===id))
        _integratedSelected.push({type, id});
    } else {
      _integratedSelected = _integratedSelected.filter(s=>!(s.type===type&&s.id===id));
    }
  });
  updateIntBatchBar();
}

function intClearSelect() {
  _integratedSelected = [];
  document.querySelectorAll('[id^="int-row-"] input[type=checkbox]').forEach(c => c.checked = false);
  document.querySelectorAll('[id^="chk-all-"]').forEach(c => c.checked = false);
  updateIntBatchBar();
}

function updateIntBatchBar() {
  const bar = document.getElementById('int-batch-bar');
  const cnt = document.getElementById('int-sel-count');
  if (!bar) return;
  const n = _integratedSelected.length;
  bar.style.display = n > 0 ? 'flex' : 'none';
  if (cnt) cnt.textContent = `已選 ${n} 項`;
}

async function intRunAll() {
  if (!confirm('確定要執行全部已啟用的備份項目（專案 + syslog + GCP）？')) return;
  try {
    await apiPost('/api/integrated/run-all', {});
    toast('已觸發全部備份，請稍後重新整理查看結果', 'success');
    setTimeout(renderIntegratedBackup, 3000);
  } catch(e) { toast(e.message, 'error'); }
}

async function intBatchRun() {
  if (!_integratedSelected.length) { toast('請先勾選項目', 'warning'); return; }
  const projectItems = _integratedSelected.filter(s => s.type === 'project');
  const otherItems   = _integratedSelected.filter(s => s.type !== 'project');
  const promises = [];
  for (const it of projectItems) {
    promises.push(
      apiPost('/api/backups/trigger', { project_id: it.id, target_type: 'all' })
        .catch(e => console.warn('[intBatchRun] project', it.id, e))
    );
  }
  if (otherItems.length) {
    promises.push(
      apiPost('/api/integrated/batch-run', { items: otherItems })
        .catch(e => console.warn('[intBatchRun] batch', e))
    );
  }
  try {
    await Promise.all(promises);
    toast(`已觸發 ${_integratedSelected.length} 個備份任務`, 'success');
    setTimeout(renderIntegratedBackup, 3000);
  } catch(e) { toast(e.message, 'error'); }
}

async function runIntProject(id) {
  try {
    await apiPost('/api/backups/trigger', { project_id: id, target_type: 'all' });
    toast('專案備份已觸發', 'success');
    setTimeout(renderIntegratedBackup, 3000);
  } catch(e) { toast(e.message, 'error'); }
}

async function runSyslogInt(id) {
  try {
    await apiPost(`/api/syslogs/${id}/run`, {});
    toast('日誌備份已觸發', 'success');
    setTimeout(renderIntegratedBackup, 2500);
  } catch(e) { toast(e.message, 'error'); }
}

async function runGcpInt(id) {

function showBatchSchedule() {
  if (!_integratedSelected.length) { toast('請先勾選項目', 'warning'); return; }
  openModal('批次設定排程頻率', `
    <div style="margin-bottom:14px;color:var(--text2);font-size:13px">
      將對 <strong>${_integratedSelected.length}</strong> 個項目設定相同的 cron 排程頻率。
    </div>
    <div class="form-group">
      <label class="form-label">Cron 表達式 <span style="color:var(--danger)">*</span></label>
      <input id="batch-cron" class="form-input" placeholder="例：0 2 * * *" value="">
      <div class="form-hint" style="margin-top:8px">
        常用範例：<br>
        <span class="mono" style="color:var(--primary)">0 2 * * *</span> — 每天凌晨 2 點<br>
        <span class="mono" style="color:var(--primary)">0 */6 * * *</span> — 每 6 小時<br>
        <span class="mono" style="color:var(--primary)">0 0 * * 0</span> — 每週日午夜<br>
        <span class="mono" style="color:var(--primary)">0 0 1 * *</span> — 每月 1 日
      </div>
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="submitBatchSchedule()">套用至選取項目</button>
  `);
}

async function submitBatchSchedule() {
  const cron = document.getElementById('batch-cron').value.trim();
  if (!cron) { toast('請填寫 cron 表達式', 'warning'); return; }
  try {
    const res = await apiPost('/api/integrated/batch-schedule', {
      items: _integratedSelected,
      cron_expr: cron
    });
    toast(`已更新 ${res.updated} 個項目的排程頻率`, 'success');
    closeModal();
    intClearSelect();
    renderIntegratedBackup();
  } catch(e) { toast(e.message, 'error'); }
}

let _schedClockTimer = null;

function _startSchedClock() {
  if (_schedClockTimer) clearInterval(_schedClockTimer);
  function tick() {
    if (currentPage !== 'schedules') { clearInterval(_schedClockTimer); _schedClockTimer = null; return; }
    const now  = new Date();
    const hms  = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const date = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
    const el   = document.getElementById('sched-clock');
    const de   = document.getElementById('sched-date');
    if (el) el.textContent = hms;
    if (de) de.textContent = date;
  }
  tick();
  _schedClockTimer = setInterval(tick, 1000);
}

async function renderOnlineSec() {
  setTitle('線上服務與資安');
  setContent(`
    <div class="page-hdr">
      <div class="page-hdr-left">
        <h1>線上服務與資安</h1>
        <p>監控網站異常、處理館方叫修需求。</p>
      </div>
    </div>
    <div class="tabs" id="onlinesec-tabs">
      <div class="tab${currentOnlineSecTab==='calendar'?' active':''}" onclick="switchOnlineSecTab('calendar')">📅 每日備份狀態行事曆</div>
      <div class="tab${currentOnlineSecTab==='history'?' active':''}" onclick="_onlineSecHistoryFilter='';switchOnlineSecTab('history')">📋 歷史備份紀錄</div>
      <div class="tab${currentOnlineSecTab==='security'?' active':''}" onclick="switchOnlineSecTab('security')">🛡️ 季度資安弱點掃描紀錄</div>

  `);

}

function switchOnlineSecTab(tab) {
  currentOnlineSecTab = tab;
  const tabLabelMap = {
    calendar: '📅 每日備份狀態行事曆',
    history:  '📋 歷史備份紀錄',
    security: '🛡️ 季度資安弱點掃描紀錄',
    cases:    '📝 案件列表',
  };
  document.querySelectorAll('#onlinesec-tabs .tab').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === tabLabelMap[tab]);
  });
  const tc = document.getElementById('onlinesec-tab-content');
  if (!tc) return;
  tc.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  if (tab === 'calendar') renderOnlineSecCalendar();
  else if (tab === 'history')  renderOnlineSecHistory();
  else if (tab === 'security') renderOnlineSecSecurity();
  else if (tab === 'cases')    renderOnlineSecCases();
}

function _calStatusIcon(status) {
  if (status === 'success') return '<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:2px solid var(--success);color:var(--success);font-size:12px;font-weight:700;line-height:1">✓</span>';
  if (status === 'failed')  return '<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:2px solid var(--danger);color:var(--danger);font-size:12px;font-weight:700;line-height:1">✕</span>';
  if (status === 'running') return '<span style="font-size:13px;line-height:1">⏳</span>';
  if (status === 'pending') return '<span style="font-size:12px;line-height:1">🔜</span>';
  return '';
}

async function renderOnlineSecCalendar() {
  try {
    const [recordsData, syslogs, projScheds, gcps] = await Promise.all([
      apiGet('/api/backups?limit=500'),
      apiGet('/api/syslogs'),
      apiGet('/api/schedules/all'),
      apiGet('/api/gcpconfigs'),
    ]);
    const allRecs = recordsData.records || [];
    const syls    = syslogs || [];
    const scheds  = projScheds || [];
    const gcpArr  = gcps || [];

    // ── Top stats ──
    const totalCount  = allRecs.length;
    const failedCount = allRecs.filter(r => r.status === 'failed').length;
    const totalSize   = allRecs.reduce((a, r) => a + (r.size_bytes || 0), 0);
    const sylsEnabled = syls.filter(s => s.enabled).length;

    // ── Calendar ──
    const now       = new Date();
    const year      = now.getFullYear();
    const month     = now.getMonth();
    const todayStr  = `${year}-${String(month+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const yDate     = new Date(+new Date(year, month, now.getDate()) - 86400000);
    const yStr      = `${yDate.getFullYear()}-${String(yDate.getMonth()+1).padStart(2,'0')}-${String(yDate.getDate()).padStart(2,'0')}`;

    // Group records by day (current month)
    const recordsByDay = {};
    allRecs.forEach(r => {
      const d = new Date(r.created_at);
      if (d.getFullYear() === year && d.getMonth() === month) {
        const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        recordsByDay[key] = recordsByDay[key] || [];
        recordsByDay[key].push(r);
      }
    });

    // Pending future dates
    const pendingDates = new Set();
    scheds.filter(s => s.enabled && s.next_run_at).forEach(s => {
      const d = new Date(s.next_run_at);
      if (d.getFullYear() === year && d.getMonth() === month) {
        pendingDates.add(`${year}-${String(month+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
      }
    });

    function dayStatus(dateStr) {
      const recs = recordsByDay[dateStr] || [];
      if (recs.some(r => r.status === 'running'))                        return 'running';
      if (recs.some(r => r.status === 'failed'))                         return 'failed';
      if (recs.length > 0 && recs.every(r => r.status === 'success'))   return 'success';
      if (dateStr > todayStr && pendingDates.has(dateStr))               return 'pending';
      return 'none';
    }

    // Build calendar grid (Monday first)
    const daysInMonth  = new Date(year, month + 1, 0).getDate();
    const rawFirstDay  = new Date(year, month, 1).getDay();
    const startPadding = rawFirstDay === 0 ? 6 : rawFirstDay - 1;
    const monthName    = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long' });

    let calCells = '';
    for (let i = 0; i < startPadding; i++) calCells += '<div class="cal-cell cal-empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr  = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const status   = dayStatus(dateStr);
      const dayRecs  = recordsByDay[dateStr] || [];
      const isToday  = dateStr === todayStr;
      const ok       = dayRecs.filter(r => r.status === 'success').length;
      const fail     = dayRecs.filter(r => r.status === 'failed').length;
      const tip      = dayRecs.length > 0 ? `${dayRecs.length}筆：${ok}成功 ${fail}失敗` : (status === 'pending' ? '待執行' : '無紀錄');
      calCells += `<div class="cal-cell cal-${status}${isToday?' cal-today':''}" title="${tip}">
        <div class="cal-day-num">${d}</div>
        <div class="cal-day-icon">${_calStatusIcon(status)}</div>
      </div>`;
    }

    // ── Side panels (今日 / 昨日) side by side ──
    function sidePanel(label, dateStr, recs) {
      const ok   = recs.filter(r => r.status === 'success').length;
      const fail = recs.filter(r => r.status === 'failed').length;
      const sz   = recs.reduce((a, r) => a + (r.size_bytes || 0), 0);
      return `<div class="card" style="padding:14px;flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:19px;font-weight:800;color:var(--text);line-height:1.2">${label}</div>
            <div style="font-size:13px;color:var(--text2);margin-top:4px">${dateStr}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:32px;font-weight:800;color:var(--text);line-height:1">${recs.length}</div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:5px">
              <span style="display:inline-flex;align-items:center;gap:3px;font-size:12px">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--success)"></span>
                <span style="color:var(--text2)">成功</span>
                <b style="color:var(--success)">${ok}</b>
              </span>
              <span style="display:inline-flex;align-items:center;gap:3px;font-size:12px">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger)"></span>
                <span style="color:var(--text2)">失敗</span>
                <b style="color:var(--danger)">${fail}</b>
              </span>
            </div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text2);border-top:1px solid var(--border);padding-top:6px;margin-top:10px">總大小：${fmtSize(sz)}</div>
      </div>`;
    }

    // ── 推導各專案最新備份狀態（補足 last_run_status 為空）──
    const calProjLastRec = {};
    allRecs.forEach(r => {
      if (r.project_id) {
        if (!calProjLastRec[r.project_id] || new Date(r.created_at) > new Date(calProjLastRec[r.project_id].created_at)) {
          calProjLastRec[r.project_id] = r;
        }
      }
    });

    // ── Active items table ──
    const allActiveItems = [
      ...scheds.filter(s => s.enabled).map(s => ({
        name: s.project_name || '—',
        status: s.last_run_status || (calProjLastRec[s.project_id]?.status) || '',
        lastRun: s.last_run_at || (calProjLastRec[s.project_id]?.created_at) || null,
        nextRun: s.next_run_at,
      })),
      ...syls.filter(s => s.enabled).map(s => ({
        name: s.name, status: s.run_status, lastRun: s.last_run_at,
        nextRun: s.cron_expr ? cronNextRun(s.cron_expr) : null,
      })),
      ...gcpArr.filter(g => g.enabled).map(g => ({
        name: g.name, status: g.run_status, lastRun: g.last_run_at,
        nextRun: g.cron_expr ? cronNextRun(g.cron_expr) : null,
      })),
    ];

    const itemRows = allActiveItems.map(it => `<tr>
        <td><strong>${esc(it.name)}</strong></td>
        <td>${runStatusBadge(it.status)}</td>
        <td style="font-size:12px;white-space:nowrap">${fmtDate(it.lastRun) || '—'}</td>
        <td style="font-size:12px;white-space:nowrap">${it.nextRun ? fmtDate(it.nextRun) : '—'}</td>
      </tr>`).join('');

    const tc = document.getElementById('onlinesec-tab-content');
    if (!tc) return;
    tc.innerHTML = `
      <div class="stat-grid" style="margin-bottom:20px">
        <div class="stat-card c-green" style="cursor:pointer" onclick="_onlineSecHistoryFilter='';switchOnlineSecTab('history')" title="查看歷史備份紀錄">
          <div class="stat-label">備份總次數</div>
          <div class="stat-value" style="text-align:right">${totalCount}</div>
          <div class="stat-sub" style="text-align:right;color:var(--primary)">歷史備份紀錄 →</div>
        </div>
        <div class="stat-card ${failedCount>0?'c-red':'c-green'}" style="cursor:pointer" onclick="_onlineSecHistoryFilter='failed';switchOnlineSecTab('history')" title="查看失敗備份紀錄">
          <div class="stat-label">失敗總次數</div>
          <div class="stat-value" style="text-align:right">${failedCount}</div>
          <div class="stat-sub" style="text-align:right;color:var(--${failedCount>0?'danger':'success'})">備份失敗紀錄 →</div>
        </div>
        <div class="stat-card c-yellow">
          <div class="stat-label">備份總大小</div>
          <div class="stat-value" style="text-align:right">${fmtSize(totalSize)}</div>
          <div class="stat-sub" style="text-align:right">所有歷史備份</div>
        </div>
        <div class="stat-card c-blue">
          <div class="stat-label">系統日誌</div>
          <div class="stat-value" style="text-align:right">${sylsEnabled}</div>
          <div class="stat-sub" style="text-align:right">啟用中</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
        <div class="card" style="padding:0;overflow:hidden">
          <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
            <h3 style="font-size:14px;font-weight:700">${monthName} 備份狀態</h3>
            <div style="display:flex;gap:10px;font-size:12px;color:var(--text2);flex-wrap:wrap">
              <span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;border:2px solid var(--success);color:var(--success);font-size:10px;font-weight:700;line-height:1">✓</span>成功</span>
              <span style="display:inline-flex;align-items:center;gap:4px"><span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;border:2px solid var(--danger);color:var(--danger);font-size:10px;font-weight:700;line-height:1">✕</span>失敗</span>
              <span style="display:inline-flex;align-items:center;gap:4px"><span style="font-size:11px">⏳</span>進行中</span>
              <span style="display:inline-flex;align-items:center;gap:4px"><span style="font-size:11px">🔜</span>待執行</span>
            </div>
          </div>
          <div style="padding:10px 12px">
            <div class="cal-grid">
              <div class="cal-hdr">一</div><div class="cal-hdr">二</div><div class="cal-hdr">三</div>
              <div class="cal-hdr">四</div><div class="cal-hdr">五</div>
              <div class="cal-hdr" style="color:var(--danger)">六</div>
              <div class="cal-hdr" style="color:var(--danger)">日</div>
              ${calCells}
            </div>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:12px">
          <div style="display:flex;gap:10px">
            ${sidePanel('今日備份統計', todayStr, recordsByDay[todayStr] || [])}
            ${sidePanel('昨日備份統計', yStr, recordsByDay[yStr] || [])}
          </div>
          <div class="card" style="padding:0;overflow:hidden">
            <div style="padding:10px 14px;border-bottom:1px solid var(--border)">
              <h3 style="font-size:13px;font-weight:700">啟用中備份項目</h3>
            </div>
            <div class="table-wrap" style="border:none;border-radius:0">
              <table>
                <thead><tr><th>名稱</th><th>上次結果</th><th>最後執行</th><th>下次執行</th></tr></thead>
                <tbody>${itemRows || '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:12px">—</td></tr>'}</tbody>
              </table>
            </div>
          </div>
          ${allActiveItems.length === 0 ? '' : ''}
        </div>
      </div>
    `;
  } catch(e) {
    const tc = document.getElementById('onlinesec-tab-content');
    if (tc) tc.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${esc(e.message)}</div>`;
  }
}
