async function renderOnlineSecCases() {
  const tc = document.getElementById('onlinesec-tab-content');
  if (!tc) return;
  tc.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  try {
    const [scheds, syslogs, gcps] = await Promise.all([
      apiGet('/api/schedules/all'),
      apiGet('/api/syslogs'),
      apiGet('/api/gcpconfigs'),
    ]);

    const schedEnabled = (scheds || []).filter(s => s.enabled);
    const sylsEnabled  = (syslogs || []).filter(s => s.enabled);
    const gcpsEnabled  = (gcps || []).filter(g => g.enabled);

    const freqLabel = freq => ({ daily:'每日', weekly:'每週', monthly:'每月', other:'自訂' }[freq] || '—');
    const freqBadge = expr => {
      const freq = cronFrequency(expr);
      const colors = { daily:'#dbeafe;color:#1d4ed8', weekly:'#f0fdf4;color:#16a34a', monthly:'#f5f3ff;color:#6d28d9', other:'#fff7ed;color:#c2410c' };
      const c = colors[freq] || 'var(--surface2);color:var(--text2)';
      return freq ? `<span style="display:inline-block;padding:1px 8px;border-radius:99px;font-size:12px;font-weight:600;background:${c}">${freqLabel(freq)}</span>` : '—';
    };

    const rows = [
      ...schedEnabled.map(s => {
        const typeLabels = (s.target_types || []).map(t => typeBadge(t)).join(' ');
        const name = s.project_name + (s.label ? ` / ${s.label}` : '');
        return `<tr>
          <td><span class="badge badge-files" style="font-size:12px">專案備份</span></td>
          <td><strong>${esc(name)}</strong></td>
          <td>${typeLabels || '—'}</td>
          <td>${freqBadge(s.cron_expr)}</td>
          <td>${runStatusBadge(s.last_run_status)}</td>
          <td style="font-size:12px;white-space:nowrap">${fmtDate(s.last_run_at) || '—'}</td>
          <td style="font-size:12px;white-space:nowrap">${fmtDate(s.next_run_at) || '—'}</td>
        </tr>`;
      }),
      ...sylsEnabled.map(s => `<tr>
          <td><span class="badge badge-system" style="font-size:12px">系統日誌</span></td>
          <td><strong>${esc(s.name)}</strong></td>
          <td>${typeBadge('syslog')}</td>
          <td>${freqBadge(s.cron_expr)}</td>
          <td>${runStatusBadge(s.run_status)}</td>
          <td style="font-size:12px;white-space:nowrap">${fmtDate(s.last_run_at) || '—'}</td>
          <td style="font-size:12px;white-space:nowrap">${s.cron_expr ? (fmtDate(cronNextRun(s.cron_expr)) || '—') : '—'}</td>
        </tr>`),
      ...gcpsEnabled.map(g => `<tr>
          <td><span class="badge badge-database" style="font-size:12px">GCP 備份</span></td>
          <td><strong>${esc(g.name)}</strong></td>
          <td>${typeBadge('gcp')}</td>
          <td>${freqBadge(g.cron_expr)}</td>
          <td>${runStatusBadge(g.run_status)}</td>
          <td style="font-size:12px;white-space:nowrap">${fmtDate(g.last_run_at) || '—'}</td>
          <td style="font-size:12px;white-space:nowrap">${g.cron_expr ? (fmtDate(cronNextRun(g.cron_expr)) || '—') : '—'}</td>
        </tr>`),
    ].join('');

    const total = schedEnabled.length + sylsEnabled.length + gcpsEnabled.length;

    tc.innerHTML = `
      <div class="page-hdr" style="margin-bottom:14px">
        <div class="page-hdr-left">
          <h2 style="font-size:18px;font-weight:700">啟用中備份項目</h2>
          <p>共 ${total} 個啟用中的備份工作</p>
        </div>
        <div class="page-hdr-right">
          <button class="btn btn-sm btn-secondary" onclick="renderOnlineSecCases()">↺ 重新整理</button>
        </div>
      </div>
      <div class="stat-grid" style="margin-bottom:18px">
        <div class="stat-card c-blue">
          <div class="stat-label">專案備份排程</div>
          <div class="stat-value">${schedEnabled.length}</div>
          <div class="stat-sub">啟用中</div>
        </div>
        <div class="stat-card c-yellow">
          <div class="stat-label">系統日誌備份</div>
          <div class="stat-value">${sylsEnabled.length}</div>
          <div class="stat-sub">啟用中</div>
        </div>
        <div class="stat-card c-green">
          <div class="stat-label">GCP 備份</div>
          <div class="stat-value">${gcpsEnabled.length}</div>
          <div class="stat-sub">啟用中</div>
        </div>
      </div>
      ${total === 0
        ? `<div class="empty"><div class="empty-icon">📋</div><div style="font-size:15px;font-weight:600;margin-bottom:8px">尚無啟用中的備份項目</div></div>`
        : `<div class="table-wrap">
            <table>
              <thead><tr><th>類型</th><th>名稱</th><th>備份內容</th><th>頻率</th><th>上次結果</th><th>最後執行</th><th>下次執行</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`
      }
    `;
  } catch(e) {
    tc.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${esc(e.message)}</div>`;

let sshSince = '', sshUntil = '', sshUser = '';

async function renderSshAudit() {
  setTitle('SSH 登入稽核');

  // 預設：今天
  const today = new Date().toISOString().slice(0, 10);
  if (!sshSince) sshSince = today + 'T00:00';
  if (!sshUntil) { const n = new Date(); sshUntil = n.toISOString().slice(0, 16); }

  setContent(`
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px">
      <div class="form-group" style="margin:0">
        <label class="form-label" style="font-size:13px">開始時間</label>
        <input id="ssh-since" type="datetime-local" class="form-input" style="width:200px" value="${sshSince}" onchange="sshSince=this.value">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label" style="font-size:13px">結束時間</label>
        <input id="ssh-until" type="datetime-local" class="form-input" style="width:200px" value="${sshUntil}" onchange="sshUntil=this.value">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label" style="font-size:13px">過濾使用者</label>
        <input id="ssh-user" type="text" class="form-input" style="width:150px" placeholder="全部" value="${esc(sshUser)}" onchange="sshUser=this.value">
      </div>
      <button class="btn btn-primary" onclick="loadSshAudit()">🔍 查詢</button>
    </div>
    <div id="ssh-stats" class="stat-grid" style="margin-bottom:22px"></div>
    <div class="card" style="padding:0">
      <div id="ssh-table"><div class="loading"><div class="spinner"></div>載入中...</div></div>
    </div>`);

  await loadSshAudit();
}

async function loadSshAudit() {
  const sinceVal = (document.getElementById('ssh-since')?.value || sshSince).replace('T', ' ') + ':00';
  const untilVal = (document.getElementById('ssh-until')?.value || sshUntil).replace('T', ' ') + ':00';
  const userVal  =  document.getElementById('ssh-user')?.value  || sshUser;

  document.getElementById('ssh-table').innerHTML = '<div class="loading"><div class="spinner"></div>查詢中...</div>';
  document.getElementById('ssh-stats').innerHTML = '';

  try {
    let url = `/api/ssh-audit?since=${encodeURIComponent(sinceVal)}&until=${encodeURIComponent(untilVal)}`;
    if (userVal) url += `&user=${encodeURIComponent(userVal)}`;
    const data = await apiGet(url);

    // 統計卡
    document.getElementById('ssh-stats').innerHTML = `
      <div class="stat-card c-green"><div class="stat-label">成功登入</div><div class="stat-value">${data.sum_login}</div></div>
      <div class="stat-card c-red"><div class="stat-label">登入失敗</div><div class="stat-value">${data.sum_failed}</div></div>
      <div class="stat-card c-yellow"><div class="stat-label">sudo 操作</div><div class="stat-value">${data.sum_sudo}</div></div>
      <div class="stat-card c-blue"><div class="stat-label">不重複使用者</div><div class="stat-value">${data.sum_unique_users}</div></div>
      <div class="stat-card c-blue"><div class="stat-label">不重複來源 IP</div><div class="stat-value">${data.sum_unique_ips}</div></div>`;

    if (!data.events.length) {
      document.getElementById('ssh-table').innerHTML = '<div class="empty"><div class="empty-icon">🔐</div>此時段無 SSH 事件</div>';
      return;
    }

    const rows = data.events.map(e => {
      return `<tr>
        <td style="white-space:nowrap;font-size:13px">${fmtDate(e.time)}</td>
        <td>${sshTypeBadge(e.type)}</td>
        <td>${e.user ? `<code style="font-size:13px">${esc(e.user)}</code>` : '—'}</td>
        <td>${e.from_ip ? `<code style="font-size:13px">${esc(e.from_ip)}</code>` : '—'}</td>
        <td>${e.method ? `<span style="font-size:13px;color:var(--text2)">${esc(e.method)}</span>` : '—'}</td>
        <td style="max-width:340px;word-break:break-all;font-size:13px">${e.command ? `<code>${esc(e.command)}</code>` : esc(e.raw || '').slice(0, 120)}</td>
      </tr>`;
    }).join('');

    document.getElementById('ssh-table').innerHTML = `
      <div class="table-wrap" style="border-radius:0">
        <table>
          <thead><tr>
            <th>時間</th><th>類型</th><th>使用者</th><th>來源 IP</th><th>認證方式</th><th>詳細</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  } catch(e) {
    const msg = e.message || '未知錯誤';
    let hint = '';
    if (msg.includes('agent 無回應') || msg.includes('connection refused')) {
      hint = `<li>確認 agent 是否在執行：<code>systemctl status backup-agent</code></li>
              <li>確認 agent 監聽位址：<code>ss -tlnp | grep 9090</code></li>
              <li>確認 .env 的 AGENT_URL 設定：<code>grep AGENT_URL .env</code></li>`;
    } else if (msg.includes('journalctl')) {
      hint = `<li>確認 journald 是否運作：<code>systemctl status systemd-journald</code></li>
              <li>確認 agent 執行身份（需有 journal 讀取權）：<code>systemctl show backup-agent -p User</code></li>`;
    } else if (msg.includes('502') || msg.includes('Bad Gateway')) {
      hint = `<li>Dashboard 無法連到 agent，請確認 AGENT_URL 路由可達</li>
              <li>從 host 測試：<code>curl http://&lt;AGENT_URL&gt;/healthz</code></li>`;
    }
    document.getElementById('ssh-table').innerHTML = `
      <div style="padding:20px;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius);color:var(--danger)">
        <div style="font-weight:700;font-size:15px;margin-bottom:8px">⚠️ 查詢失敗</div>
        <div style="font-family:monospace;font-size:13px;word-break:break-all;margin-bottom:${hint ? '12px' : '0'}">${esc(msg)}</div>
        ${hint ? `<div style="font-size:13px;color:var(--text);margin-top:8px"><b>診斷建議：</b><ul style="margin:6px 0 0 18px;line-height:1.8">${hint}</ul></div>` : ''}
      </div>`;
  }
}

function sshTypeBadge(type) {
  const map = {
    login:         ['badge-success', '✓ 登入成功'],
    login_failed:  ['badge-failed',  '✗ 登入失敗'],
    invalid_user:  ['badge-failed',  '✗ 無效使用者'],
    logout:        ['badge-off',     '⎋ 登出'],
    session_open:  ['badge-on',      '▶ 工作階段開啟'],
    session_close: ['badge-off',     '■ 工作階段關閉'],
    sudo:          ['badge-running', '⚡ sudo 操作'],
    other:         ['',              '— 其他'],
  };
  const [cls, label] = map[type] || ['', type];
  return `<span class="badge ${cls}" style="font-size:12px">${label}</span>`;
}

function initAdminTabs() {
  const tabs = document.getElementById('admin-tabs');
  if (!tabs) return;
  const panels = [...document.querySelectorAll('#content > .card.sg')];
  panels.forEach((panel, index) => {
    panel.classList.add('admin-tab-panel');
    panel.id = `admin-panel-${index}`;
    panel.setAttribute('role', 'tabpanel');
    const titleEl = panel.querySelector('.card-title');
    const title = panel.dataset.adminTab || titleEl?.querySelector(':scope > span')?.textContent.trim() || [...(titleEl?.childNodes || [])].find(n => n.nodeType === Node.TEXT_NODE && n.textContent.trim())?.textContent.trim() || `功能 ${index+1}`;
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'tab'; btn.id = `admin-tab-${index}`;
    btn.setAttribute('role','tab'); btn.setAttribute('aria-controls',panel.id);
    btn.textContent = title;
    btn.onclick = () => selectAdminTab(index, true);
    btn.onkeydown = e => {
      if (e.key !== 'ArrowRight' && e.key !== 'ArrowLeft') return;
      e.preventDefault();
      const next = (index + (e.key === 'ArrowRight' ? 1 : -1) + panels.length) % panels.length;
      selectAdminTab(next, true); document.getElementById(`admin-tab-${next}`)?.focus();
    };
    tabs.appendChild(btn);
  });
  selectAdminTab(Math.max(0, Math.min(Number(sessionStorage.getItem('adminTab') || 0), panels.length-1)), false);
}

function selectAdminTab(index, remember) {
  const panels = [...document.querySelectorAll('#content > .admin-tab-panel')];
  panels.forEach((panel, i) => {
    const active = i === index;
    panel.hidden = !active;
    document.getElementById(`admin-tab-${i}`)?.classList.toggle('active', active);
    document.getElementById(`admin-tab-${i}`)?.setAttribute('aria-selected', String(active));
    document.getElementById(`admin-tab-${i}`)?.setAttribute('tabindex', active ? '0' : '-1');
  });
  if (remember) sessionStorage.setItem('adminTab', String(index));
}

async function loadPostgresLogs(){
  const projectId=document.getElementById('pg-project-sel')?.value,el=document.getElementById('pg-operation-logs');
  if(!projectId||!el)return;
  const status=document.getElementById('pg-log-status')?.value||'',limit=document.getElementById('pg-log-limit')?.value||'50';
  el.innerHTML='<div class="loading"><div class="spinner"></div>載入 Log...</div>';
  try{
    const data=await apiGet(`/api/projects/${projectId}/postgres/logs?limit=${encodeURIComponent(limit)}&status=${encodeURIComponent(status)}`),logs=data.logs||[];

function renderSQLDiff(diff,leftLabel,rightLabel){return `<div class="diff-summary"><div class="diff-stat"><b>${diff.left_lines}</b><span>${esc(leftLabel)}有效行</span></div><div class="diff-stat"><b>${diff.right_lines}</b><span>${esc(rightLabel)}有效行</span></div><div class="diff-stat"><b style="color:var(--success)">+${diff.added_lines}</b><span>新增行</span></div><div class="diff-stat"><b style="color:var(--danger)">-${diff.removed_lines}</b><span>移除行</span></div></div>${diff.identical?'<div class="badge badge-success">內容相同</div>':`<div class="form-row"><div class="form-group"><label class="form-label">新增（最多 40 行）</label><div class="sql-preview">${esc((diff.added_sample||[]).join('\n')||'—')}</div></div><div class="form-group"><label class="form-label">移除（最多 40 行）</label><div class="sql-preview">${esc((diff.removed_sample||[]).join('\n')||'—')}</div></div></div>`}`}

function commandStatusBadge(status) {
  const map = {
    pending: ['badge-running', 'pending'],
    running: ['badge-running', 'running'],
    success: ['badge-success', 'success'],
    failed: ['badge-failed', 'failed'],
  };
  const [cls, label] = map[status] || ['', status || '—'];
  return `<span class="badge ${cls}">${esc(label)}</span>`;
}

function toggleAgentConfigMode() {
  const mode = document.getElementById('ac-save-mode')?.value || 'create_new';
  const nameEl = document.getElementById('ac-name');
  const codeEl = document.getElementById('ac-code');
  const baseUrlEl = document.getElementById('ac-base-url');
  const tokenEl = document.getElementById('ac-token');
  const modeHintEl = document.getElementById('ac-mode-hint');
  const tokenHintEl = document.getElementById('ac-token-hint');
  if (!nameEl || !codeEl || !baseUrlEl || !tokenEl || !modeHintEl || !tokenHintEl) return;

  if (mode === 'update_existing') {
    nameEl.value = document.getElementById('ac-current-name')?.value || '';
    codeEl.value = document.getElementById('ac-current-code')?.value || '';
    baseUrlEl.value = document.getElementById('ac-current-base-url')?.value || '';
    tokenEl.value = document.getElementById('ac-current-token')?.value || '';
    modeHintEl.textContent = '這個模式會直接更新目前選到的 agent。只有要修改既有遠端 agent 時才使用。';
    tokenHintEl.textContent = `目前預覽：${tokenEl.value ? `${tokenEl.value.slice(0, 3)}...${tokenEl.value.slice(-3)}` : '—'}`;
    return;
  }

  nameEl.value = '';
  codeEl.value = '';
  baseUrlEl.value = '';
  tokenEl.value = '';
  modeHintEl.textContent = '來源 Agent 只當模板使用，不會被修改。請填入別台主機要使用的 name / code / base_url / token。';
  tokenHintEl.textContent = '目前模式為建立新主機 agent，請填入新 token。';
}

async function saveAgentConfig(agentId) {
  const body = {
    save_mode: document.getElementById('ac-save-mode').value,
    name: document.getElementById('ac-name').value.trim(),
    code: document.getElementById('ac-code').value.trim(),
    base_url: document.getElementById('ac-base-url').value.trim(),
    dashboard_url: document.getElementById('ac-dashboard-url').value.trim(),
    token: document.getElementById('ac-token').value.trim(),
    agent_addr: document.getElementById('ac-agent-addr').value.trim(),
    host_prefix: document.getElementById('ac-host-prefix').value,
    nas_base: document.getElementById('ac-nas-base').value.trim(),
    slack_webhook_url: document.getElementById('ac-slack-webhook-url').value.trim(),
  };
  if (!body.name || !body.code || !body.base_url || !body.dashboard_url || !body.token) {
    toast('name, code, base_url, dashboard_url, token 不可為空', 'warning');
    return;
  }
  try {
    const res = await apiPost(`/api/agents/${agentId}/config`, body);
    loadAdminAgents();
    openModal(body.save_mode === 'update_existing' ? `Agent 設定已更新: ${esc(res.name || body.name)}` : `新主機 Agent 已建立: ${esc(res.name || body.name)}`, `
      <div class="form-group">
        <label class="form-label">/etc/backup-agent/env 內容</label>
        <div style="display:flex;gap:8px">
          <textarea id="agent-env-content" class="form-input mono" style="min-height:220px">${esc(res.env_content || '')}</textarea>
          <button class="btn btn-secondary" onclick="copyText('agent-env-content')">複製</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">一鍵套用指令</label>
        <div style="display:flex;gap:8px">
          <textarea id="agent-apply-command" class="form-input mono" style="min-height:220px">${esc(res.apply_command || '')}</textarea>
          <button class="btn btn-secondary" onclick="copyText('agent-apply-command')">複製</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">重啟檢查指令</label>
        <div style="display:flex;gap:8px">
          <input id="agent-restart-command" class="form-input mono" value="${esc(res.restart_command || '')}">
          <button class="btn btn-secondary" onclick="copyText('agent-restart-command')">複製</button>
        </div>
      </div>
      <div class="form-hint">${body.save_mode === 'update_existing' ? '請把上面的 env 或套用指令貼到目標 VM 執行，然後確認 agent heartbeat 是否恢復正常。' : '來源 dashboard agent 不會被修改。請把上面的 env 或套用指令貼到新主機執行，再回來確認 heartbeat。'}</div>
    `, `
      <button class="btn btn-primary" onclick="closeModal()">完成</button>
    `, true);
    toast(body.save_mode === 'update_existing' ? 'dashboard 端 agent 設定已更新' : '已建立新主機 agent 並產生設定', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function showAgentPreflight(agentId, agentName) {
  try {
    const projects = await apiGet('/api/projects');

async function loadAgentReleaseCapability() {
  const el = document.getElementById('agent-release-capability');

  try {
    const cap = await apiGet('/api/admin/agent-releases/capability');

      btn.dataset.buildAvailable = '1';
      btn.dataset.buildReason = '';
      btn.title = '';
      el.innerHTML = `目前可建置。workspace：<span class="mono">${esc(cap.workdir || '—')}</span>，script：<span class="mono">${esc(cap.script || '—')}</span>`;
      return;

async function buildAgentRelease() {
  const btn = document.getElementById('agent-release-build-btn');
  if (btn && btn.dataset.buildAvailable === '0') {
    const reason = btn.dataset.buildReason || '請先確認上方說明';
    toast(`目前環境未啟用 agent release build：${reason}`, 'warning');
    return;
  }
  const version = document.getElementById('agent-release-version')?.value.trim();
  if (!version) { toast('請填寫版本號', 'warning'); return; }
  const registerAgent = document.getElementById('agent-release-register-toggle')?.checked;
  const body = { version };
  if (registerAgent) {
    const payload = {
      name: document.getElementById('agent-release-agent-name')?.value.trim(),
      code: document.getElementById('agent-release-agent-code')?.value.trim(),
      base_url: document.getElementById('agent-release-agent-base-url')?.value.trim(),
      token: document.getElementById('agent-release-agent-token')?.value.trim(),
      dashboard_url: document.getElementById('agent-release-dashboard-url')?.value.trim(),
      agent_addr: document.getElementById('agent-release-agent-addr')?.value.trim() || ':9090',
    };
    if (!payload.name || !payload.code || !payload.base_url || !payload.token || !payload.dashboard_url) {
      toast('勾選同步建立 Agent 後，name, code, base_url, token, dashboard_url 不可為空', 'warning');
      return;
    }
    body.register_agent = payload;
  }
  try {
    if (btn) {
      btn.disabled = true;
      btn.textContent = '建置中...';
    }
    toast('開始建置 agent artifact，請稍候...', 'info');
    const rel = await apiPost('/api/admin/agent-releases/build', body);
    toast(registerAgent ? `已建立版本 ${rel.version}，並同步更新 Agent 管理資料` : `已建立版本 ${rel.version}`, 'success');
    loadAgentReleases();
    if (rel.agent_config) {
      openModal(`Agent Release ${rel.version} 已完成`, `
        <div style="display:flex;flex-direction:column;gap:14px">
          <div style="font-size:13px;color:var(--text2)">
            已同步建立或更新 Agent：<strong>${esc(rel.agent_config.name || rel.agent_config.code || '—')}</strong><br>
            Code：<span class="mono">${esc(rel.agent_config.code || '—')}</span><br>
            Base URL：<span class="mono">${esc(rel.agent_config.base_url || '—')}</span>
          </div>
          <div>
            <div class="form-label">/etc/backup-agent/env 內容</div>
            <div style="display:flex;gap:8px">
              <textarea id="agent-release-env-content" class="form-input mono" style="min-height:220px">${esc(rel.agent_config.env_content || '')}</textarea>
              <button class="btn btn-secondary" onclick="copyText('agent-release-env-content')">複製</button>
            </div>
          </div>
          <div>
            <div class="form-label">一鍵套用指令</div>
            <div style="display:flex;gap:8px">
              <textarea id="agent-release-apply-command" class="form-input mono" style="min-height:220px">${esc(rel.agent_config.apply_command || '')}</textarea>
              <button class="btn btn-secondary" onclick="copyText('agent-release-apply-command')">複製</button>
            </div>
          </div>
        </div>
      `, `<button class="btn btn-primary" onclick="closeModal(); showAgentReleaseDetail('${esc(rel.version)}')">查看版本詳情</button>`, true);
    } else {
      showAgentReleaseDetail(rel.version);
    }
  } catch(e) {
    if (e?.data?.log_ref) {
      openModal('Agent Release 建置失敗', `
        <div style="display:flex;flex-direction:column;gap:14px">
          <div style="padding:12px 14px;border:1px solid var(--danger-border);border-radius:var(--radius);background:var(--danger-bg);color:var(--danger)">
            ${esc(e.message)}
          </div>
          <div>
            <div class="form-label">實體 Log 路徑</div>
            <div style="display:flex;gap:8px">
              <input id="agent-release-log-ref" class="form-input mono" value="${esc(e.data.log_ref)}">
              <button class="btn btn-secondary" onclick="copyText('agent-release-log-ref')">複製</button>
            </div>
          </div>
          <div class="form-hint">請到 dashboard 所在主機讀取這個檔案，再把內容貼給我分析。</div>
        </div>
      `, `<button class="btn btn-primary" onclick="closeModal()">關閉</button>`, true);
    }
    toast(e.message, 'error');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = '建立新版本';
    }
  }
}

async function importAgentRelease() {
  const btn = document.getElementById('agent-release-import-btn');
  const version = document.getElementById('agent-release-import-version')?.value.trim();
  const fileInput = document.getElementById('agent-release-import-bundle');
  const bundle = fileInput?.files?.[0];
  if (!version) { toast('請填寫手動上傳版本號', 'warning'); return; }
  if (!bundle) { toast('請選擇 release bundle', 'warning'); return; }

  const form = new FormData();
  form.append('version', version);
  form.append('bundle', bundle);

  try {
    if (btn) {
      btn.disabled = true;
      btn.textContent = '上傳中...';
    }
    toast('開始上傳 agent release bundle，請稍候...', 'info');
    const rel = await apiFormPost('/api/admin/agent-releases/import', form);

    if (fileInput) fileInput.value = '';
    loadAgentReleases();

      openModal('Agent Release 匯入失敗', `

// ── 系統磁碟狀況 ──────────────────────────────────
async function loadDiskUsage() {
  const el = document.getElementById('disk-usage-panel');
  const btn = document.getElementById('disk-refresh-btn');
  if (!el) return;
  el.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  if (btn) btn.disabled = true;
  try {
    const data = await apiGet('/api/disk-usage');
    if (!data || !data.partitions || data.partitions.length === 0) {
      el.innerHTML = '<div class="empty" style="padding:24px"><div class="empty-icon">💽</div>無法取得磁碟資訊</div>';
      return;
    }
    const ts = data.collected_at ? fmtDate(data.collected_at) : '';
    el.innerHTML = `
      ${ts ? `<div style="font-size:12px;color:var(--text3);margin-bottom:12px">資料收集時間：${ts}</div>` : ''}
      <div style="display:flex;flex-direction:column;gap:14px">
        ${data.partitions.map(p => {
          const pct = Math.min(100, Math.round(p.used_percent));
          const color = pct >= 90 ? 'var(--danger)' : pct >= 75 ? 'var(--warning)' : 'var(--success)';
          const totalGB = (p.total_bytes / 1073741824).toFixed(1);
          const usedGB  = (p.used_bytes  / 1073741824).toFixed(1);
          const freeGB  = (p.free_bytes  / 1073741824).toFixed(1);
          return `<div style="padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div>
                <span style="font-weight:600;font-size:14px">${esc(p.mount_point)}</span>
                <span style="font-size:12px;color:var(--text3);margin-left:8px">${esc(p.filesystem)}</span>
              </div>
              <span style="font-weight:700;font-size:15px;color:${color}">${pct}%</span>
            </div>
            <div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px">
              <div style="height:100%;width:${pct}%;background:${color};transition:width .4s"></div>
            </div>
            <div style="display:flex;gap:18px;font-size:12px;color:var(--text2)">
              <span>已使用 <b style="color:var(--text)">${usedGB} GB</b></span>
              <span>可用 <b style="color:var(--text)">${freeGB} GB</b></span>
              <span>總計 <b style="color:var(--text)">${totalGB} GB</b></span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty" style="padding:24px"><div class="empty-icon">⚠️</div>${esc(e.message)}</div>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function adminExportAll() {
  try {
    const data = await apiGet('/api/projects/export-all');
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.href = url;
    a.download = `backup-projects-export-${ts}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('匯出成功', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// Health check
async function checkHealth() {
  try {
    await fetch('/healthz');
    document.getElementById('status-dot').style.background = 'var(--success)';
    document.getElementById('status-label').textContent = '服務正常';
  } catch {
    document.getElementById('status-dot').style.background = 'var(--danger)';
    document.getElementById('status-label').textContent = '無法連線';
  }
}

// Parse initial hash
(function init() {
  // ?admin=1 才顯示管理側邊欄
  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === '1') {
    isAdmin = true;
    document.getElementById('nav-admin-section').style.display = '';
    document.getElementById('nav-admin-item').style.display = '';
  }

  const hash = window.location.hash.replace('#','');
  if (hash.startsWith('project/')) {
    const id = parseInt(hash.split('/')[1]);
    if (id) { currentPage = 'project'; currentProjectId = id; }
  } else if (hash) {
    currentPage = hash;
  }
  updateNav();
  renderPage();
  checkHealth();
  setInterval(checkHealth, 30000);
})();
</script>
